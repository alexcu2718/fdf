repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        always_run: true
      - id: end-of-file-fixer
        always_run: true
      - id: check-yaml
        always_run: true
      - id: check-toml
        always_run: true

  - repo: https://github.com/FeryET/pre-commit-rust
    rev: v1.2.1
    hooks:
      - id: fmt
        name: cargo fmt
        description: Format Rust code with rustfmt
        always_run: true
        pass_filenames: false
      - id: test
        name: cargo test
        description: Run Rust tests
        always_run: true
        pass_filenames: false

  - repo: local
    hooks:
      - id: clippy-test
        name: Clippy Test
        description: Run comprehensive clippy linting
        entry: ./clippy_test.sh
        language: system
        files: \.rs$
        pass_filenames: false
        always_run: true
      - id: cargo-doc
        name: Cargo Doc
        description: Generate and check Rust documentation
        entry: cargo doc --no-deps
        language: system
        files: \.rs$
        pass_filenames: false
        always_run: true
      - id: cargo-test
        name: Cargo Test
        description: Run Rust tests
        entry: cargo test
        language: system
        files: \.rs$
        pass_filenames: false
        always_run: false
      - id: shellcheck-local
        name: ShellCheck
        description: Run ShellCheck
        entry: shellcheck
        language: system
        pass_filenames: true
        files: \.sh$
